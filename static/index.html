<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Agent Console — Autonomous Document Agent</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e14;
    --panel: #10151d;
    --panel-2: #151b25;
    --line: #202834;
    --text: #e6edf3;
    --muted: #7c8a9a;
    --accent: #5fd8c9;
    --accent-dim: #2c4b47;
    --amber: #e8b463;
    --danger: #e8747c;
    --mono: 'JetBrains Mono', monospace;
    --sans: 'Inter', sans-serif;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
  }
  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px 80px;
  }
  .wrap { width: 100%; max-width: 920px; }

  header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 28px;
    padding-bottom: 18px;
    border-bottom: 1px solid var(--line);
  }
  .brand {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .dot {
    width: 9px; height: 9px; border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 8px var(--accent);
  }
  h1 {
    font-family: var(--mono);
    font-size: 16px;
    font-weight: 600;
    letter-spacing: 0.02em;
    margin: 0;
    color: var(--text);
  }
  .tag {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  .card {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 10px;
    padding: 22px 24px;
    margin-bottom: 20px;
  }
  .card-label {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--accent);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .card-label::before { content: '›'; color: var(--muted); }

  textarea {
    width: 100%;
    min-height: 90px;
    background: var(--bg);
    border: 1px solid var(--line);
    border-radius: 7px;
    color: var(--text);
    font-family: var(--sans);
    font-size: 14.5px;
    line-height: 1.5;
    padding: 14px;
    resize: vertical;
    outline: none;
    transition: border-color 0.15s;
  }
  textarea:focus { border-color: var(--accent); }
  textarea::placeholder { color: var(--muted); }

  .examples {
    display: flex; gap: 8px; flex-wrap: wrap;
    margin-top: 12px;
  }
  .example-btn {
    font-family: var(--mono);
    font-size: 11.5px;
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--line);
    border-radius: 20px;
    padding: 6px 12px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .example-btn:hover { color: var(--accent); border-color: var(--accent-dim); }

  .run-row {
    display: flex;
    justify-content: flex-end;
    margin-top: 16px;
  }
  button.run {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.03em;
    background: var(--accent);
    color: #06120f;
    border: none;
    border-radius: 7px;
    padding: 11px 22px;
    cursor: pointer;
    transition: filter 0.15s, transform 0.1s;
  }
  button.run:hover { filter: brightness(1.08); }
  button.run:active { transform: scale(0.98); }
  button.run:disabled { opacity: 0.5; cursor: not-allowed; }

  /* Console log */
  #console { display: none; }
  .log-line {
    font-family: var(--mono);
    font-size: 13px;
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 0;
    border-bottom: 1px solid var(--line);
    opacity: 0;
    transform: translateY(4px);
    animation: rise 0.35s ease forwards;
  }
  .log-line:last-child { border-bottom: none; }
  @keyframes rise { to { opacity: 1; transform: translateY(0); } }

  .step-status {
    width: 84px; flex-shrink: 0;
    font-size: 10.5px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    font-weight: 600;
  }
  .status-pending { color: var(--muted); }
  .status-running { color: var(--amber); }
  .status-done { color: var(--accent); }
  .status-tool { color: #b39ddb; }

  .step-title { color: var(--text); font-size: 13.5px; }
  .step-title .heading { color: var(--muted); }

  .spinner {
    display: inline-block;
    width: 9px; height: 9px;
    border-radius: 50%;
    border: 2px solid var(--accent-dim);
    border-top-color: var(--amber);
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Results */
  #results { display: none; }
  .result-title {
    font-size: 20px;
    font-weight: 700;
    margin: 0 0 4px;
  }
  .result-sub {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 18px;
  }
  .summary-line {
    font-size: 14px;
    line-height: 1.6;
    color: var(--text);
    background: var(--panel-2);
    border-left: 3px solid var(--accent);
    padding: 12px 16px;
    border-radius: 4px;
    margin-bottom: 20px;
  }

  .assumptions {
    list-style: none;
    padding: 0; margin: 0;
  }
  .assumptions li {
    font-size: 13.5px;
    line-height: 1.55;
    color: var(--muted);
    padding: 8px 0 8px 20px;
    position: relative;
    border-bottom: 1px solid var(--line);
  }
  .assumptions li:last-child { border-bottom: none; }
  .assumptions li::before {
    content: '!';
    position: absolute; left: 0; top: 8px;
    color: var(--amber);
    font-family: var(--mono);
    font-weight: 700;
    font-size: 12px;
  }

  .download-row {
    margin-top: 22px;
    display: flex;
    align-items: center;
    gap: 14px;
  }
  a.download-btn {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 600;
    background: var(--text);
    color: var(--bg);
    text-decoration: none;
    padding: 11px 20px;
    border-radius: 7px;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    transition: filter 0.15s;
  }
  a.download-btn:hover { filter: brightness(0.9); }

  .error-box {
    display: none;
    font-family: var(--mono);
    font-size: 13px;
    color: var(--danger);
    background: rgba(232, 116, 124, 0.08);
    border: 1px solid rgba(232, 116, 124, 0.3);
    border-radius: 7px;
    padding: 14px 16px;
    margin-bottom: 20px;
  }

  footer {
    margin-top: 30px;
    text-align: center;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.03em;
  }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="brand">
      <span class="dot"></span>
      <h1>autonomous-document-agent</h1>
    </div>
    <span class="tag">plan · execute · self-check · docx</span>
  </header>

  <div class="card">
    <div class="card-label">Request</div>
    <textarea id="requestInput" placeholder="Describe what you need — e.g. &quot;Create a project plan for launching a mobile app in 3 months&quot;"></textarea>
    <div class="examples">
      <button class="example-btn" data-fill="standard">↳ Standard example</button>
      <button class="example-btn" data-fill="ambiguous">↳ Ambiguous example</button>
    </div>
    <div class="run-row">
      <button class="run" id="runBtn">Run agent →</button>
    </div>
  </div>

  <div class="error-box" id="errorBox"></div>

  <div class="card" id="console">
    <div class="card-label">Agent execution log</div>
    <div id="logLines"></div>
  </div>

  <div class="card" id="results">
    <div class="card-label">Generated document</div>
    <div class="result-title" id="resTitle"></div>
    <div class="result-sub" id="resMeta"></div>
    <div class="summary-line" id="resSummary"></div>

    <div class="card-label">Assumptions &amp; notes (self-check)</div>
    <ul class="assumptions" id="resAssumptions"></ul>

    <div class="download-row">
      <a class="download-btn" id="downloadLink" href="#" target="_blank">⭳ Download .docx</a>
    </div>
  </div>

  <footer>POST /agent · localhost:8000</footer>
</div>

<script>
const EXAMPLES = {
  standard: "Create a project plan for launching a mobile app in 3 months",
  ambiguous: "We need something for tomorrow's client meeting about our new product, not sure exactly what format, and the budget numbers aren't finalized yet."
};

document.querySelectorAll('.example-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.getElementById('requestInput').value = EXAMPLES[btn.dataset.fill];
  });
});

const runBtn = document.getElementById('runBtn');
const consoleCard = document.getElementById('console');
const logLines = document.getElementById('logLines');
const resultsCard = document.getElementById('results');
const errorBox = document.getElementById('errorBox');

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

async function runAgent() {
  const requestText = document.getElementById('requestInput').value.trim();
  if (requestText.length < 3) {
    showError('Enter a request first — the agent needs something to plan against.');
    return;
  }

  errorBox.style.display = 'none';
  resultsCard.style.display = 'none';
  consoleCard.style.display = 'block';
  logLines.innerHTML = '';
  runBtn.disabled = true;
  runBtn.textContent = 'Running…';

  addLog('pending', 'Sending request to agent…', true);

  let data;
  try {
    const resp = await fetch('/agent', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ request: requestText })
    });
    if (!resp.ok) {
      const err = await resp.json().catch(() => ({}));
      throw new Error(err.detail ? JSON.stringify(err.detail) : `Request failed (${resp.status})`);
    }
    data = await resp.json();
  } catch (e) {
    logLines.lastChild.remove();
    showError('Agent request failed: ' + e.message + ' — is the server running on port 8000?');
    resetButton();
    return;
  }

  logLines.lastChild.remove(); // remove "sending..." line
  addLog('done', `Plan created — ${data.plan.length} steps, doc type: ${data.doc_type}`);
  await sleep(300);

  // Reveal each planned step as if executing live
  for (const step of data.plan) {
    const line = addLog('running', `${step.section_heading}`, true, step.title);
    await sleep(380 + Math.random() * 220);
    line.querySelector('.step-status').outerHTML = '<span class="step-status status-done">done</span>';
    line.querySelector('.spinner')?.remove();
    if (step.tools_used && step.tools_used.length > 0) {
      await sleep(150);
      addLog('tool', `↳ called tool: ${step.tools_used.join(', ')}`);
    }
  }

  await sleep(200);
  addLog('done', 'Self-check complete — ' + data.assumptions.length + ' note(s) flagged');
  await sleep(250);
  addLog('done', 'Document generated');

  renderResults(data);
  resetButton();
}

function addLog(status, text, running, subtitle) {
  const line = document.createElement('div');
  line.className = 'log-line';
  const statusMap = { done: 'status-done', running: 'status-running', tool: 'status-tool' };
  const labelMap = { done: 'done', running: 'running', tool: 'tool' };
  const statusClass = statusMap[status] || 'status-pending';
  const statusLabel = labelMap[status] || 'queued';
  line.innerHTML = `
    <span class="step-status ${statusClass}">${statusLabel}</span>
    ${running ? '<span class="spinner"></span>' : ''}
    <span class="step-title">${text}${subtitle ? ` <span class="heading">— ${subtitle}</span>` : ''}</span>
  `;
  logLines.appendChild(line);
  return line;
}

function renderResults(data) {
  document.getElementById('resTitle').textContent = data.title;
  document.getElementById('resMeta').textContent = data.doc_type.toUpperCase() + '  ·  ' + data.plan.length + ' sections';
  document.getElementById('resSummary').textContent = data.summary;

  const list = document.getElementById('resAssumptions');
  list.innerHTML = '';
  data.assumptions.forEach(a => {
    const li = document.createElement('li');
    li.textContent = a;
    list.appendChild(li);
  });

  document.getElementById('downloadLink').href = data.download_url;
  resultsCard.style.display = 'block';
  resultsCard.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function showError(msg) {
  errorBox.textContent = msg;
  errorBox.style.display = 'block';
}

function resetButton() {
  runBtn.disabled = false;
  runBtn.textContent = 'Run agent →';
}

runBtn.addEventListener('click', runAgent);
</script>
</body>
</html>
